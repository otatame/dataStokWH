<!DOCTYPE html>
<html lang="en">
<head>
    <style>@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap');</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/2.3.7/css/dataTables.dataTables.css">
    <link rel="icon" href="/img/Logo KIK Small.png">
    <title>Stok Warehouse</title>
</head>
<body style="padding: 10px; font-family: outfit;">
    <header style="display: flex; margin-bottom: 30px;">
        <img src="img/Logo KIK Small.png" alt="logo-kik" style="width: 100px; padding-right: 20px;">
        <div style="display: flex; flex-direction: column; margin-top: 10px;">
            <h1 style="margin:0">Data Stok Box</h1>
            <h2 style="font-style: italic; margin: 0;">Warehouse</h2>
        </div>
    </header>   
    <table id="dataStok" class="display" style="width: 100%; padding: 20px">
        <thead>
            <tr>
                <th>No Box</th>
                <th>Material</th>
                <th>Jenis</th>
                <th>Type Barang</th>
                <th>Merek Barang</th>
                <th>Ukuran</th>
                <th>Jml Stok Awal</th>
                <th>sat</th>
                <th>Jml Stok Keluar</th>
                <th>sat</th>
                <th>Sisa stock</th>
                <th>sat</th>
                <th>Berat Barang / bh</th>
                <th>sat</th>
            </tr>
        </thead>
    </table>
    <script type="text/javascript" src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script type="text/javascript" src="https://cdn.datatables.net/2.3.7/js/dataTables.js"></script>
    <script src="script.js"></script>

</body>
</html>
