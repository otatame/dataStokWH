<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/2.3.7/css/dataTables.dataTables.css">
    <title>Stok Warehouse</title>
</head>
<body style="padding: 10px; font-family: Arial, Helvetica, sans-serif;">
    <h1>Data Stok Box</h1>
    <table id="dataStok" class="display" style="width: 100%; padding: 20px">
        <thead>
            <tr>
                <th>No Box</th>
                <th>Material</th>
                <th>Jenis</th>
                <th>Type Barang</th>
                <th>Merek Barang</th>
                <th>Ukuran</th>
                <th>Jml Stok Awal</th>
                <th>sat</th>
                <th>Jml Stok Keluar</th>
                <th>sat</th>
                <th>Sisa stock</th>
                <th>sat</th>
                <th>Berat Barang / bh</th>
                <th>sat</th>
            </tr>
        </thead>
    </table>
    <script type="text/javascript" src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script type="text/javascript" src="https://cdn.datatables.net/2.3.7/js/dataTables.js"></script>
    <script>
        new DataTable('#dataStok', {
            ajax: 'https://script.google.com/macros/s/AKfycbyOV7hmEV7X3jqILTkAux9K1y5y9wW_Xyw71SB1kZraGOa7kMojRzKSpkLH5EC_C7SHIA/exec',
            columns: [
                { data: 'NO BOX' },
                { data: 'MATERIAL' },
                { data: 'Jenis' },
                { data: 'Type Barang' },
                { data: 'Merek Barang' },
                { data: 'Ukuran' },
                { data: 'Jml Stok Awal' },
                { data: 'Sat1' },
                { data: 'Jml Stok Keluar' },
                { data: 'Sat2' },
                { data: 'Sisa stock' },
                { data: 'Sat3' },
                { data: 'Berat Barang / bh' },
                { data: 'Sat4' },
            ]
        });
    </script>

</body>
</html>
